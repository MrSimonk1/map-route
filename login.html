<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Enter</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f5f5f5;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        input {
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            margin-left: 10px;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Enter password</h2>
        <input type="password" id="password">
        <button onclick="login()">Enter</button>
    </div>

    <script src="login.js"></script>

</body>

</html>
